name: Fetch feeds

on:
  workflow_dispatch:
  schedule:
    # JST 07:00
    - cron: "0 22 * * *"

permissions:
  contents: write
  models: read

jobs:
  fetch-feeds:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch feeds and build today summary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/fetch_feeds.py

      - name: Commit generated files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update collected feeds"
          file_pattern: "today.md docs/**/*.md data/*.json"
