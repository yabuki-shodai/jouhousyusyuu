name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "scripts/update_pages_index.py"
      - "scripts/build_pages_site.py"
      - "requirements-pages.txt"
      - ".github/workflows/pages.yml"
  workflow_run:
    workflows:
      - Fetch feeds
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-pages.txt

      - name: Install site dependencies
        run: python -m pip install --requirement requirements-pages.txt

      - name: Build index
        run: python scripts/update_pages_index.py

      - name: Build static site
        run: python scripts/build_pages_site.py

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
